<!DOCTYPE html>
<html lang="ja">
<head>

<title>Publicis LiveRamp thumbnail</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Noto Sans CJK JP", sans-serif; position: relative; }
  .bg {
    position: absolute; top: 0; left: 0;
    width: 1280px; height: 670px;

    height: 670px; width: 760px;

  }
  .eyebrow {
    font-size: 16px; font-weight: 700;
    letter-spacing: 0.34em; color: #d8b15a;
    margin-bottom: 28px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.6);
  }
  .title {
    font-size: 55px; font-weight: 900;
    line-height: 1.3; color: #ffffff;
    text-shadow: 0 2px 14px rgba(0,0,0,0.78);
  }
  .title .accent { color: #e7b24e; }
  .subtitle {
    margin-top: 24px; font-size: 23px; font-weight: 500;
    line-height: 1.5; color: #d5ccb8; letter-spacing: 0.02em;

</head>
<body>
  <div class="bg"></div>
