<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Publicis LiveRamp thumbnail</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1280px;
    height: 670px;
    overflow: hidden;
  }
  body {
    font-family: "Noto Sans CJK JP", sans-serif;
    position: relative;
    background:
      radial-gradient(900px 700px at 88% 8%, rgba(96,176,224,0.55) 0%, rgba(96,176,224,0) 60%),
      linear-gradient(123deg, #0a2649 0%, #134e89 54%, #1f6aac 100%);
  }

  /* 右側グラフィック */
  .graphic {
    position: absolute;
    top: 0;
    right: 0;
    width: 640px;
    height: 670px;
  }

  /* 左テキストブロック */
  .content {
    position: absolute;
    left: 66px;
    top: 0;
    height: 670px;
    width: 720px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .eyebrow {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.34em;
    color: #93b8dd;
    margin-bottom: 30px;
  }
  .title {
    font-size: 63px;
    font-weight: 900;
    line-height: 1.24;
    color: #ffffff;
    letter-spacing: 0.005em;
  }
  .title .accent { color: #e9a23c; }
  .subtitle {
    margin-top: 26px;
    font-size: 24px;
    font-weight: 500;
    line-height: 1.5;
    color: #c4d6e8;
    letter-spacing: 0.02em;
  }
  .rule {
    margin-top: 34px;
    width: 56px;
    height: 3px;
    background: #e9a23c;
    border-radius: 2px;
  }
  .tag {
    margin-top: 22px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: #88aacb;
  }
</style>
</head>
<body>

  <svg class="graphic" viewBox="0 0 640 670" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="hub" cx="38%" cy="34%" r="72%">
        <stop offset="0%" stop-color="#7cc0ec"/>
        <stop offset="46%" stop-color="#2f7cba"/>
        <stop offset="100%" stop-color="#0c2f5b"/>
      </radialGradient>
      <radialGradient id="hubGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="rgba(233,162,60,0.42)"/>
        <stop offset="55%" stop-color="rgba(233,162,60,0.10)"/>
        <stop offset="100%" stop-color="rgba(233,162,60,0)"/>
      </radialGradient>
      <radialGradient id="node" cx="36%" cy="32%" r="74%">
        <stop offset="0%" stop-color="#9fd2f1"/>
        <stop offset="100%" stop-color="#1d568f"/>
      </radialGradient>
      <linearGradient id="flow" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="rgba(150,196,232,0.18)"/>
        <stop offset="100%" stop-color="rgba(233,162,60,0.85)"/>
      </linearGradient>
    </defs>

    <!-- 接続線：3買収 -> ハブ -->
    <g fill="none" stroke="url(#flow)" stroke-width="2.4" stroke-linecap="round">
      <path d="M 129 150 Q 268 196 362 262"/>
      <path d="M 92 350 Q 224 344 345 340"/>
      <path d="M 130 552 Q 264 492 367 417"/>
    </g>

    <!-- 流れを示すドット -->
    <g fill="#e9a23c">
      <circle cx="234" cy="187" r="3.4" opacity="0.85"/>
      <circle cx="300" cy="222" r="3.4" opacity="0.9"/>
      <circle cx="206" cy="345" r="3.4" opacity="0.85"/>
      <circle cx="288" cy="342" r="3.4" opacity="0.9"/>
      <circle cx="232" cy="508" r="3.4" opacity="0.85"/>
      <circle cx="304" cy="455" r="3.4" opacity="0.9"/>
    </g>

    <!-- ハブの外周グロー -->
    <circle cx="510" cy="335" r="280" fill="url(#hubGlow)"/>
    <!-- 軌道リング -->
    <circle cx="510" cy="335" r="210" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1.5"/>
    <circle cx="510" cy="335" r="186" fill="none" stroke="rgba(233,162,60,0.22)" stroke-width="1.5" stroke-dasharray="2 9"/>

    <!-- 3買収ノード -->
    <circle cx="95" cy="130" r="38" fill="url(#node)" stroke="rgba(255,255,255,0.45)" stroke-width="1.6"/>
    <circle cx="58" cy="350" r="27" fill="url(#node)" stroke="rgba(255,255,255,0.4)" stroke-width="1.6"/>
    <circle cx="112" cy="565" r="33" fill="url(#node)" stroke="rgba(255,255,255,0.42)" stroke-width="1.6"/>

    <!-- 統合ハブ -->
    <circle cx="510" cy="335" r="166" fill="url(#hub)"/>
    <circle cx="510" cy="335" r="166" fill="none" stroke="rgba(233,162,60,0.92)" stroke-width="2.6"/>
    <circle cx="510" cy="335" r="132" fill="none" stroke="rgba(255,255,255,0.16)" stroke-width="1.4"/>
    <circle cx="510" cy="335" r="20" fill="#ffffff" opacity="0.94"/>
    <circle cx="510" cy="335" r="42" fill="none" stroke="rgba(255,255,255,0.34)" stroke-width="1.6"/>
  </svg>

  <div class="content">
    <div class="eyebrow">PROGRAMMATIC NOTES</div>
    <div class="title">
      Publicisが<span class="accent">3,400億円</span>で<br>
      LiveRampを買った理由
    </div>
    <div class="subtitle">65億ドルが築く、データインフラの現在地</div>
    <div class="rule"></div>
    <div class="tag">Ad Tech &#215; Data &#215; 2026</div>
  </div>

</body>
</html>
