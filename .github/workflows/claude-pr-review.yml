name: Claude PR Auto Review

# ConsultingOS Phase 1 SDK 化 PoC
# トリガー: PR 作成・更新時に Claude Code が /review-pr スキルで自動レビュー
# セットアップ: GitHub Secrets に ANTHROPIC_API_KEY を登録（Settings → Secrets and variables → Actions）
# 詳細: .claude/skills/claude-code-ops/references/sdk-automation.md

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has_anthropic_key: ${{ steps.check.outputs.has_anthropic_key }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "has_anthropic_key=true" >> $GITHUB_OUTPUT
          else
            echo "has_anthropic_key=false" >> $GITHUB_OUTPUT
            echo "ℹ️  ANTHROPIC_API_KEY 未設定: claude-pr-review はスキップ（PR をブロックしない）" >&2
          fi

  review:
    needs: check-secrets
    if: needs.check-secrets.outputs.has_anthropic_key == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude PR Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            ConsultingOS の /review-pr スキル（5 軸評価）に従って、この PR をレビューしてください。

            5 軸:
            1. 設計（外科的変更原則・依頼範囲超過の有無）
            2. 規律遵守（CLAUDE.md ハードルール 16 項目に違反していないか）
            3. セキュリティ（cybersecurity-playbook の Layer 0/1/2 + GitHub アカウントセキュリティ 18 ルール）
            4. テスト・検証（typecheck / test / lint 実施根拠）
            5. ドキュメント（コミットメッセージ・PR 説明・evolution-log への影響）

            出力ルール:
            - 日本語で記述
            - 結論 → 根拠 → 具体アクションの順序
            - Markdown 太字 ** は使わず、強調は「カギ括弧」or 大文字キーワードで代替
            - 末尾に【反証チェック結果】Step 1-3 + 残存リスクを必ず付与
            - 出典なし具体数値の断言は禁止、FACT/INFERENCE/SPECULATION の 3 ラベル明示
            - 短文・端的でも反証チェックブロックは省略禁止（圧縮版 2-3 行は可）
          claude_args: "--allowed-tools read"
