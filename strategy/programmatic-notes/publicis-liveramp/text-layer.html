<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Publicis LiveRamp text layer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Noto Sans CJK JP", sans-serif; position: relative; }
  .bg {
    position: absolute; top: 0; left: 0;
    width: 1280px; height: 670px;
    background: linear-gradient(90deg,
      rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.70) 42%, rgba(0,0,0,0.20) 64%, rgba(0,0,0,0) 78%);
  }
  .content {
    position: absolute; left: 66px; top: 0;
    height: 670px; width: 750px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .eyebrow {
    font-size: 16px; font-weight: 700;
    letter-spacing: 0.34em; color: #c9a24b;
    margin-bottom: 28px;
  }
  .title {
    font-size: 55px; font-weight: 900;
    line-height: 1.3; color: #ffffff;
  }
  .title .accent { color: #e3ae45; }
  .subtitle {
    margin-top: 24px; font-size: 23px; font-weight: 500;
    line-height: 1.5; color: #cfc8b6; letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="content">
    <div class="eyebrow">PROGRAMMATIC NOTES</div>
    <div class="title">
      Publicisが<span class="accent">3,400億円</span>で<br>
      LiveRampを買った理由
    </div>
    <div class="subtitle">3つの買収で築いた、自前データインフラ</div>
  </div>
</body>
</html>
